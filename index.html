<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Сердце со звёздами</title>
    <style>
        * { margin: 0; padding: 0; }
        body { 
            overflow: hidden; 
            background: #0a0a1a; 
            height: 100vh;
        }
        
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        
        // ====== СЦЕНА ======
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.prepend(renderer.domElement);
        
        // ====== ЗВЁЗДЫ ======
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = [];
        const starsColors = [];
        
        for (let i = 0; i < 2000; i++) {
            starsPos.push(
                (Math.random() - 0.5) * 400,
                (Math.random() - 0.5) * 400,
                (Math.random() - 0.5) * 400 - 100
            );
            // Звёзды разных цветов (белые, голубые, жёлтые)
            const colorChoice = Math.random();
            if (colorChoice < 0.7) {
                starsColors.push(1, 1, 1); // белые
            } else if (colorChoice < 0.85) {
                starsColors.push(0.8, 0.9, 1); // голубые
            } else {
                starsColors.push(1, 0.9, 0.7); // жёлтые
            }
        }
        
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
        starsGeo.setAttribute('color', new THREE.Float32BufferAttribute(starsColors, 3));
        
        const starsMat = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
        });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);
        
        // ====== 3D СЕРДЦЕ ИЗ ЧАСТИЦ ======
        const heartPoints = [];
        for (let i = 0; i < 300; i++) {
            const t = (i / 300) * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            heartPoints.push(new THREE.Vector3(x * 0.6, y * 0.6, 0));
        }
        
        const heartGeo = new THREE.BufferGeometry();
        const heartPos = [];
        const heartCol = [];
        
        heartPoints.forEach(p => {
            for (let i = 0; i < 50; i++) {
                heartPos.push(
                    p.x + (Math.random() - 0.5) * 2,
                    p.y + (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 15
                );
                const hue = 0.95 + Math.random() * 0.05;
                const color = new THREE.Color().setHSL(hue, 1, 0.5 + Math.random() * 0.3);
                heartCol.push(color.r, color.g, color.b);
            }
        });
        
        heartGeo.setAttribute('position', new THREE.Float32BufferAttribute(heartPos, 3));
        heartGeo.setAttribute('color', new THREE.Float32BufferAttribute(heartCol, 3));
        
        const heartMat = new THREE.PointsMaterial({
            size: 0.25,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
        });
        
        const heart = new THREE.Points(heartGeo, heartMat);
        scene.add(heart);
        
        camera.position.z = 30;
        
        // ====== АНИМАЦИЯ ======
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Пульсация сердца
            const pulse = 1 + Math.sin(time * 2) * 0.05;
            heart.scale.set(pulse, pulse, pulse);
            
            // Вращение сердца
            heart.rotation.y += 0.005;
            heart.rotation.x = Math.sin(time * 0.5) * 0.05;
            
            // Мерцание звёзд
            stars.rotation.y += 0.0003;
            stars.material.opacity = 0.6 + Math.sin(time * 0.3) * 0.2;
            
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
